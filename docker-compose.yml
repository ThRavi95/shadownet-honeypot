version: "3.9"

services:
  proxy:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - cowrie

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  cowrie:
    image: cowrie/cowrie:latest
    ports:
      - "2222:2222"
