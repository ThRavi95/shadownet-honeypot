version: "3.9"

services:
  proxy:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - FRONTEND_ORIGIN=http://localhost:3001
      - ML_SERVICE_URL=http://ml-engine:5000
      - SURICATA_EVE_PATH=/var/log/suricata/eve.json
    depends_on:
      - redis
      - cowrie
      - suricata
      - ml-engine
    volumes:
      - ./sensors/suricata/logs:/var/log/suricata:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  cowrie:
    image: cowrie/cowrie:latest
    ports:
      - "2222:2222"

  suricata:
    image: jasonish/suricata:latest
    network_mode: "host"
    command:
      - -i
      - eth0
      - -S
      - /etc/suricata/rules/local.rules
      - -l
      - /var/log/suricata
    volumes:
      - ./sensors/suricata/logs:/var/log/suricata
      - ./sensors/suricata/rules:/etc/suricata/rules

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - VITE_BACKEND_URL=http://localhost:3000
    depends_on:
      - proxy

  ml-engine:
    build:
      context: .
      dockerfile: ml-engine/Dockerfile
    ports:
      - "5000:5000"
